# CI pipeline — type check, lint, build on PRs to main
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type Check + Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # Dedicated unit test step (Vitest, no coverage) — fast signal before thresholded coverage run
      - name: Run unit tests
        run: npm run test

      - name: Run tests with coverage (enforce Vitest thresholds)
        run: npm run test:coverage

      - name: Build and check bundle size
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-output.txt
          node -e "
            const fs = require('fs');
            const output = fs.readFileSync('build-output.txt', 'utf8');
            const match = output.match(/First Load JS shared by all\s+([\d.]+)\s+(kB|MB)/);
            if (match) {
              const size = parseFloat(match[1]);
              const unit = match[2];
              const sizeKB = unit === 'MB' ? size * 1024 : size;
              console.log('Shared JS bundle: ' + sizeKB.toFixed(1) + ' kB');
              if (sizeKB > 120) {
                console.error('ERROR: Shared JS exceeds 120 kB budget (' + sizeKB.toFixed(1) + ' kB)');
                process.exit(1);
              }
              console.log('Bundle size OK (under 120 kB budget)');
            } else {
              console.error('ERROR: Could not parse bundle size from build output — failing as a safeguard');
              process.exit(1);
            }
          "
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          NEXTAUTH_SECRET: "ci-placeholder-secret-minimum-32-characters-long"
          NEXTAUTH_URL: "http://localhost:3000"
          AUTH_CLIENT_ID: "ci-placeholder"
          AUTH_CLIENT_SECRET: "ci-placeholder"
          APP_URL: "http://localhost:3000"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    env:
      # Real Postgres (service below) — required because (app) layout calls syncUser → Prisma on every request
      # 127.0.0.1 avoids Node resolving localhost to ::1 while the service is IPv4-only
      DATABASE_URL: "postgresql://e2e:e2e@127.0.0.1:5432/e2e"
      NEXTAUTH_SECRET: "ci-placeholder-secret-minimum-32-characters-long"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_CLIENT_ID: "ci-placeholder"
      AUTH_CLIENT_SECRET: "ci-placeholder"
      APP_URL: "http://localhost:3000"
      E2E_TEST_USER: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e -d e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
