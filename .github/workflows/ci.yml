# CI pipeline — type check, lint, build on PRs to main
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type Check + Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build and check bundle size
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-output.txt
          node -e "
            const fs = require('fs');
            const output = fs.readFileSync('build-output.txt', 'utf8');
            const match = output.match(/First Load JS shared by all\s+([\d.]+)\s+(kB|MB)/);
            if (match) {
              const size = parseFloat(match[1]);
              const unit = match[2];
              const sizeKB = unit === 'MB' ? size * 1024 : size;
              console.log('Shared JS bundle: ' + sizeKB.toFixed(1) + ' kB');
              if (sizeKB > 120) {
                console.error('ERROR: Shared JS exceeds 120 kB budget (' + sizeKB.toFixed(1) + ' kB)');
                process.exit(1);
              }
              console.log('Bundle size OK (under 120 kB budget)');
            } else {
              console.error('ERROR: Could not parse bundle size from build output — failing as a safeguard');
              process.exit(1);
            }
          "
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          NEXTAUTH_SECRET: "ci-placeholder-secret-minimum-32-characters-long"
          NEXTAUTH_URL: "http://localhost:3000"
          AUTH_CLIENT_ID: "ci-placeholder"
          AUTH_CLIENT_SECRET: "ci-placeholder"
          APP_URL: "http://localhost:3000"
