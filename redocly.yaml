# Redocly CLI config — lint OpenAPI without strict stylistic rules that duplicate editor checks
extends:
  - recommended

apis:
  main:
    root: docs/api/openapi.yaml

rules:
  struct: off
  security-defined: off
  info-license: off
  no-server-example.com: off
  tag-description: off
  operation-operationId: off
  operation-2xx-response: off
  operation-4xx-response: off
